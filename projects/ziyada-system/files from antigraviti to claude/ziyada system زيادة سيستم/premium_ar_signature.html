<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ziyada System — Cinematic Hand-Interactive AR Signature</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ziyada-blue: #3b82f6;
            --ziyada-cyan: #06b6d4;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: url('https://www.servcorp.com.sa/media/34147/boardroom-banner-saudi-arabia-1.jpg?format=webp&quality=70&width=1920') no-repeat center center;
            background-size: cover;
            overflow: hidden;
        }

        /* Overlay for cinematic depth */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 70% 30%, transparent 0%, rgba(2, 6, 23, 0.6) 100%);
            backdrop-filter: brightness(0.9);
        }

        .ar-scene {
            position: relative;
            width: 800px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 80px;
            box-sizing: border-box;
        }

        /* Floating AR Glass */
        .ar-glass {
            position: relative;
            width: 360px;
            height: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1.5px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
            transform: perspective(1000px) rotateY(15deg) rotateX(5deg);
            animation: float 6s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes float {
            0%, 100% { transform: perspective(1000px) rotateY(15deg) rotateX(5deg) translateY(0); }
            50% { transform: perspective(1000px) rotateY(18deg) rotateX(7deg) translateY(-15px); }
        }

        /* URL Text at the top */
        .ar-url {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 3px;
            color: white;
            text-transform: uppercase;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* Scrolling Cards Content */
        .content-display {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .scroll-container {
            height: 180px;
            display: flex;
            flex-direction: column;
            animation: scroll-messages 15s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        }

        @keyframes scroll-messages {
            0%, 15% { transform: translateY(0); }
            20%, 35% { transform: translateY(-180px); }
            40%, 55% { transform: translateY(-360px); }
            60%, 75% { transform: translateY(-540px); }
            80%, 95% { transform: translateY(-720px); }
            100% { transform: translateY(0); }
        }

        .message-card {
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .msg-title {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 12px;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .msg-sub {
            font-size: 14px;
            color: var(--ziyada-cyan);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Generate Button Style as seen in image */
        .ar-footer {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .gen-btn {
            padding: 10px 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-icon {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            background: var(--ziyada-blue);
        }

        /* Hand Interactive (Bottom Right) */
        .interactive-hand {
            position: absolute;
            bottom: -50px;
            right: 150px;
            width: 450px;
            height: auto;
            z-index: 10;
            opacity: 0.95;
            filter: drop-shadow(0 0 40px rgba(0,0,0,0.5));
            pointer-events: none;
        }

        /* Hand Graphic - using a high-quality SVG/CSS construction to ensure sharpness */
        .hand-svg {
            width: 100%;
            height: auto;
            transform: rotate(-10deg);
            animation: hand-sway 6s ease-in-out infinite;
        }

        @keyframes hand-sway {
            0%, 100% { transform: rotate(-10deg) translateY(0); }
            50% { transform: rotate(-8deg) translateY(-10px); }
        }

    </style>
</head>
<body>

    <div class="ar-scene">
        
        <!-- The AR Glass Panel -->
        <div class="ar-glass">
            <div class="ar-url">ziyadasystem.com</div>
            
            <div class="content-display">
                <div class="scroll-container">
                    <!-- Message 1 -->
                    <div class="message-card">
                        <div class="msg-title">GROW IN<br>SAUDI ARABIA</div>
                        <div class="msg-sub">Market Expansion</div>
                    </div>
                    <!-- Message 2 -->
                    <div class="message-card">
                        <div class="msg-title">NEXT-GEN<br>TRANSFORM</div>
                        <div class="msg-sub">Digital Logic</div>
                    </div>
                    <!-- Message 3 -->
                    <div class="message-card">
                        <div class="msg-title">STRATEGIC<br>VISION 2030</div>
                        <div class="msg-sub">National Growth</div>
                    </div>
                    <!-- Message 4 -->
                    <div class="message-card">
                        <div class="msg-title">PREMIUM<br>B2B TECH</div>
                        <div class="msg-sub">Enterprise Ready</div>
                    </div>
                    <!-- Message 5 -->
                    <div class="message-card">
                        <div class="msg-title">SCALE YOUR<br>EXCELLENCE</div>
                        <div class="msg-sub">Future Proof</div>
                    </div>
                </div>
            </div>

            <div class="ar-footer">
                <div class="gen-btn">
                    <div class="action-icon"></div>
                    GENERATE GROWTH
                </div>
            </div>
        </div>

        <!-- Hand Interaction Overlay -->
        <div class="interactive-hand">
            <svg class="hand-svg" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Silhouette of a hand reaching up from bottom right -->
                <path d="M450 500 C 400 400, 350 350, 320 320 C 300 300, 250 280, 220 270 C 190 260, 160 270, 140 290" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
                <path d="M500 500 L 400 400 L 350 330 C 340 310, 330 280, 350 250 C 360 230, 380 220, 400 230" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
                <!-- The Blur/Light effect where hand "touches" or "supports" glass -->
                <circle cx="200" cy="300" r="100" fill="url(#hand-glow)" />
                <defs>
                    <radialGradient id="hand-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(200 300) rotate(90) scale(100)">
                        <stop stop-color="white" stop-opacity="0.1" />
                        <stop offset="1" stop-color="white" stop-opacity="0" />
                    </radialGradient>
                </defs>
            </svg>
        </div>

    </div>

</body>
</html>
