<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ziyada System Motion Signature</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .container {
            position: relative;
            width: 500px;
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* SVG Logo Animation */
        .logo-svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }

        .hexagon-outline {
            stroke: #8b5cf6;
            stroke-width: 8;
            stroke-dasharray: 1500;
            stroke-dashoffset: 1500;
            animation: drawHex 2s ease-out forwards;
        }

        .z-path {
            stroke: #ffffff;
            stroke-width: 20;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawPath 1.5s ease-out 1s forwards;
        }

        @keyframes drawHex {
            to { stroke-dashoffset: 0; }
        }

        @keyframes drawPath {
            to { stroke-dashoffset: 0; }
        }

        /* Drawing Text Animation */
        .website-text {
            font-size: 32px;
            font-weight: 800;
            color: transparent;
            position: relative;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .website-text::after {
            content: 'ziyadasystem.com';
            position: absolute;
            left: 0;
            top: 0;
            color: #3b82f6;
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            animation: writeText 3s steps(16) 2.5s forwards;
            border-right: 3px solid #06b6d4;
        }

        @keyframes writeText {
            0% { width: 0; }
            100% { width: 100%; border-right-color: transparent; }
        }

        /* Info Fade In */
        .info-fade {
            opacity: 0;
            text-align: center;
            animation: fadeIn 1.5s ease-out 5.5s forwards;
        }

        .name {
            font-size: 24px;
            color: white;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .role {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(-10px); }
        }

        /* Moving Pen Sim */
        .pen-sim {
            position: absolute;
            width: 4px;
            height: 40px;
            background: linear-gradient(to top, #06b6d4, transparent);
            top: 130px;
            left: 250px;
            opacity: 0;
            animation: penMove 3s linear 2.5s forwards;
            pointer-events: none;
        }

        @keyframes penMove {
            0% { left: 95px; opacity: 1; }
            100% { left: 405px; opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo Section -->
        <svg class="logo-svg" viewBox="0 0 512 512" fill="none">
            <polygon class="hexagon-outline" points="256,56 456,176 456,376 256,496 56,376 56,176" />
            <path class="z-path" d="M160 200 L352 200 L130 320 L352 320" stroke-linecap="round" stroke-linejoin="round" />
        </svg>

        <!-- Animated Website -->
        <div class="website-text">ziyadasystem.com</div>
        <div class="pen-sim"></div>

        <!-- Info Section -->
        <div class="info-fade">
            <div class="name">Ali Fallatah</div>
            <div class="role">Chief Technology Officer</div>
        </div>
    </div>

</body>
</html>
