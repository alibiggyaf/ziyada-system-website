<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="monoShadowW" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#ffffff" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Hexagon base — transparent for overlay on dark backgrounds -->
  <polygon points="256,56 456,176 456,376 256,496 56,376 56,176" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.15"/>
  <!-- Interconnected nodes -->
  <circle cx="256" cy="120" r="12" fill="#ffffff"/>
  <circle cx="392" cy="176" r="10" fill="#ffffff"/>
  <circle cx="392" cy="376" r="10" fill="#ffffff"/>
  <circle cx="256" cy="440" r="12" fill="#ffffff"/>
  <circle cx="120" cy="376" r="10" fill="#ffffff"/>
  <circle cx="120" cy="176" r="10" fill="#ffffff"/>
  <!-- Connecting lines -->
  <polyline points="256,120 392,176 392,376 256,440 120,376 120,176 256,120" stroke="#ffffff" stroke-width="4" fill="none" stroke-opacity="0.6"/>
  <!-- "Z" and "S" interlocked -->
  <g filter="url(#monoShadowW)">
    <!-- "Z" shape -->
    <path d="M160 200 L352 200 L160 320 L352 320" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- "S" shape -->
    <path d="M352 220 Q256 256 352 292 Q256 328 160 292" stroke="#ffffff" stroke-width="20" fill="none" stroke-opacity="0.6"/>
  </g>
</svg>