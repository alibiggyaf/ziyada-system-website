<svg width="380" height="480" viewBox="0 0 380 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="compGlass" x1="0" y1="0" x2="380" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#28376e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0f1428" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="compBorder" x1="0" y1="0" x2="380" y2="480" gradientUnits="userSpaceOnUse">
