<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glassGrad" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#28376e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0f1428" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="topShine" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="cardBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/>
    </filter>
  </defs>
  <!-- Glass card body -->
  <rect x="1" y="1" width="798" height="398" rx="18" fill="url(#glassGrad)"/>
  <!-- Top shine inset -->
  <rect x="2" y="2" width="796" height="1" rx="0" fill="url(#topShine)"/>
  <!-- Border -->
  <rect x="0.5" y="0.5" width="799" height="399" rx="18" stroke="url(#borderGrad)" stroke-width="1" fill="none"/>
  <!-- Inner shadow effect -->
  <rect x="2" y="2" width="796" height="396" rx="17" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.05" fill="none"/>
  <!-- Content placeholder areas -->
  <!-- Icon area -->
  <rect x="40" y="40" width="56" height="56" rx="12" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Title placeholder -->
  <rect x="40" y="120" width="320" height="24" rx="4" fill="#ffffff" fill-opacity="0.12"/>
  <!-- Subtitle placeholder -->
  <rect x="40" y="156" width="480" height="16" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <!-- Body text placeholder lines -->
  <rect x="40" y="200" width="720" height="12" rx="3" fill="#ffffff" fill-opacity="0.04"/>
  <rect x="40" y="224" width="680" height="12" rx="3" fill="#ffffff" fill-opacity="0.04"/>
  <rect x="40" y="248" width="560" height="12" rx="3" fill="#ffffff" fill-opacity="0.04"/>
  <!-- CTA placeholder -->
  <rect x="40" y="310" width="180" height="48" rx="10" fill="#3b82f6" fill-opacity="0.2" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1"/>
</svg>