<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ziyada System — Business Card Template</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e293b;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 60px;
    flex-wrap: wrap;
    padding: 40px;
    font-family: 'Noto Kufi Arabic', 'Plus Jakarta Sans', sans-serif;
  }
  .card-label {
    color: #94a3b8;
    font-size: 14px;
    text-align: center;
    margin-bottom: 12px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    direction: ltr;
  }
  /* Business Card — 3.5 x 2 inches at 300dpi = 1050 x 600px, scaled to screen */
  .card {
    width: 630px;
    height: 360px;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
  }
  /* ========== FRONT ========== */
  .card-front {
    background: #0f172a;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card-front::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #8b5cf6, #3b82f6, #06b6d4);
  }
  .card-top {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .card-logo {
    width: 48px;
    height: 48px;
  }
  .card-brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .card-brand-en {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 900;
    font-size: 16px;
    letter-spacing: -0.02em;
    color: #ffffff;
    direction: ltr;
    text-align: left;
  }
  .card-brand-ar {
    font-weight: 700;
    font-size: 13px;
    color: #94a3b8;
  }
  .card-divider {
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, #8b5cf6, #3b82f6, #06b6d4);
    border-radius: 1px;
    opacity: 0.6;
  }
  .card-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card-name {
    font-weight: 800;
    font-size: 18px;
    color: #ffffff;
  }
  .card-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 500;
    font-size: 12px;
    color: #3b82f6;
    direction: ltr;
    text-align: left;
  }
  .card-contact {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .card-contact-item {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 11px;
    color: #94a3b8;
    direction: ltr;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-contact-item svg {
    width: 12px;
    height: 12px;
    stroke: #3b82f6;
    flex-shrink: 0;
  }
  /* Dot pattern overlay */
  .dot-overlay {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 120px;
    height: 80px;
    opacity: 0.08;
    background-image: radial-gradient(circle, #3b82f6 1px, transparent 1px);
    background-size: 12px 12px;
  }

  /* ========== BACK ========== */
  .card-back {
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .card-back::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #8b5cf6, #3b82f6, #06b6d4);
  }
  .back-brain {
    opacity: 0.08;
    width: 220px;
    height: 220px;
  }
  .back-watermark {
    position: absolute;
    bottom: 20px;
    right: 24px;
    opacity: 0.05;
    width: 56px;
    height: 56px;
  }
  .back-url {
    position: absolute;
    bottom: 24px;
    left: 24px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 10px;
    color: #475569;
    direction: ltr;
  }
</style>
</head>
<body>

<!-- ======= FRONT SIDE ======= -->
<div>
  <div class="card-label">Front — الوجه الأمامي</div>
  <div class="card card-front">
    <div class="card-top">
      <!-- Inline logo SVG -->
      <svg class="card-logo" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
            <stop stop-color="#3b82f6"/><stop offset="0.5" stop-color="#8b5cf6"/><stop offset="1" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
        <polygon points="256,56 456,176 456,376 256,496 56,376 56,176" fill="#0f172a"/>
        <circle cx="256" cy="120" r="12" fill="#3b82f6"/><circle cx="392" cy="176" r="10" fill="#8b5cf6"/>
        <circle cx="392" cy="376" r="10" fill="#06b6d4"/><circle cx="256" cy="440" r="12" fill="#3b82f6"/>
        <circle cx="120" cy="376" r="10" fill="#8b5cf6"/><circle cx="120" cy="176" r="10" fill="#06b6d4"/>
        <polyline points="256,120 392,176 392,376 256,440 120,376 120,176 256,120" stroke="#e2e8f0" stroke-width="4" fill="none"/>
        <path d="M160 200 L352 200 L160 320 L352 320" stroke="url(#lg)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M352 220 Q256 256 352 292 Q256 328 160 292" stroke="#e2e8f0" stroke-width="20" fill="none"/>
      </svg>
      <div class="card-brand">
        <span class="card-brand-en">ZIYADA SYSTEM</span>
        <span class="card-brand-ar">زيادة سيستم</span>
      </div>
    </div>

    <div class="card-divider"></div>

    <div class="card-info">
      <div class="card-name">محمد الشمري</div>
      <div class="card-title">Chief Technology Officer</div>
    </div>

    <div class="card-contact">
      <div class="card-contact-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        m.alshamri@ziyadasystem.com
      </div>
      <div class="card-contact-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        +966 50 XXX XXXX
      </div>
      <div class="card-contact-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
        ziyadasystem.com
      </div>
    </div>
    <div class="dot-overlay"></div>
  </div>
</div>

<!-- ======= BACK SIDE ======= -->
<div>
  <div class="card-label">Back — الوجه الخلفي</div>
  <div class="card card-back">
    <!-- Brain wireframe -->
    <svg class="back-brain" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="256" cy="256" r="180" stroke="#3b82f6" stroke-width="1.5" fill="none"/>
      <circle cx="256" cy="256" r="120" stroke="#8b5cf6" stroke-width="1" fill="none"/>
      <circle cx="256" cy="256" r="60" stroke="#06b6d4" stroke-width="0.8" fill="none"/>
      <line x1="76" y1="256" x2="436" y2="256" stroke="#3b82f6" stroke-width="0.5"/>
      <line x1="256" y1="76" x2="256" y2="436" stroke="#3b82f6" stroke-width="0.5"/>
      <line x1="128" y1="128" x2="384" y2="384" stroke="#8b5cf6" stroke-width="0.4"/>
      <line x1="384" y1="128" x2="128" y2="384" stroke="#8b5cf6" stroke-width="0.4"/>
      <circle cx="256" cy="76" r="4" fill="#3b82f6"/><circle cx="436" cy="256" r="4" fill="#3b82f6"/>
      <circle cx="256" cy="436" r="4" fill="#3b82f6"/><circle cx="76" cy="256" r="4" fill="#3b82f6"/>
      <circle cx="128" cy="128" r="3" fill="#8b5cf6"/><circle cx="384" cy="128" r="3" fill="#8b5cf6"/>
      <circle cx="384" cy="384" r="3" fill="#8b5cf6"/><circle cx="128" cy="384" r="3" fill="#8b5cf6"/>
    </svg>
    <!-- Logo watermark -->
    <svg class="back-watermark" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="256,56 456,176 456,376 256,496 56,376 56,176" fill="none" stroke="#ffffff" stroke-width="3"/>
      <path d="M160 200 L352 200 L160 320 L352 320" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="back-url">ziyadasystem.com</div>
  </div>
</div>

</body>
</html>
