<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تهنئة عيد الفطر - علي فلاتة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #05010a;
      --bg: #0a0a0f;
      --violet: #7000ff;
      --violet-soft: rgba(112, 0, 255, 0.22);
      --violet-line: rgba(112, 0, 255, 0.38);
      --white: #ffffff;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gold: #f6c35b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(112, 0, 255, 0.25), transparent 42%),
        radial-gradient(circle at 90% 82%, rgba(246, 195, 91, 0.12), transparent 38%),
        linear-gradient(180deg, #0b0716 0%, #05010a 100%);
      color: var(--white);
      font-family: "Cairo", sans-serif;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .story {
      width: min(100%, 1080px);
      aspect-ratio: 9 / 16;
      max-height: 1920px;
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(165deg, rgba(112, 0, 255, 0.13), rgba(112, 0, 255, 0) 52%),
        linear-gradient(0deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.02)),
        var(--bg);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.65);
      isolation: isolate;
    }

    .story::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 95px,
          rgba(112, 0, 255, 0.08) 96px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 95px,
          rgba(112, 0, 255, 0.08) 96px
        );
      opacity: 0.5;
      pointer-events: none;
      z-index: -2;
    }

    .shape {
      position: absolute;
      border: 1px solid var(--violet-line);
      background: linear-gradient(135deg, rgba(112, 0, 255, 0.2), rgba(112, 0, 255, 0.03));
      box-shadow: 0 20px 48px rgba(112, 0, 255, 0.18);
      transform-style: preserve-3d;
    }

    .shape.one {
      width: 270px;
      height: 270px;
      top: 90px;
      left: 80px;
      border-radius: 34px;
      transform: rotate(18deg);
    }

    .shape.two {
      width: 200px;
      height: 200px;
      bottom: 120px;
      right: 70px;
      border-radius: 26px;
      transform: rotate(-17deg);
    }

    .shape.three {
      width: 150px;
      height: 150px;
      top: 400px;
      right: 110px;
      border-radius: 20px;
      transform: rotate(28deg);
      opacity: 0.75;
    }

    .content {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 94px 84px 78px;
    }

    .top-label {
      align-self: flex-start;
      background: var(--violet-soft);
      color: var(--white);
      border: 1px solid var(--violet-line);
      border-radius: 999px;
      padding: 10px 24px;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .main {
      text-align: center;
      margin-top: 36px;
    }

    .eid-title {
      font-size: clamp(72px, 8.3vw, 96px);
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 0 26px rgba(112, 0, 255, 0.25);
      margin-bottom: 14px;
    }

    .divider {
      width: 220px;
      height: 5px;
      margin: 0 auto 28px;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent 0%, var(--violet) 50%, transparent 100%);
    }

    .eid-sub {
      font-size: clamp(36px, 4.6vw, 52px);
      line-height: 1.45;
      font-weight: 700;
      color: var(--gray-300);
      margin-bottom: 32px;
    }

    .eid-message {
      font-size: clamp(29px, 3.35vw, 38px);
      line-height: 1.8;
      font-weight: 600;
      max-width: 840px;
      margin: 0 auto;
      color: var(--white);
    }

    .eid-message .gold {
      color: var(--gold);
      font-weight: 800;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-top: 40px;
    }

    .brand {
      text-align: right;
    }

    .brand-ar {
      font-size: 45px;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .brand-en {
      font-family: "Inter", sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--gray-400);
      text-transform: uppercase;
    }

    .dua {
      font-size: 24px;
      color: var(--gray-300);
      font-weight: 600;
      text-align: left;
      max-width: 420px;
      line-height: 1.6;
    }

    .footer-glow {
      position: absolute;
      inset: auto 0 0 0;
      height: 200px;
      background: radial-gradient(circle at 50% 100%, rgba(112, 0, 255, 0.25), transparent 62%);
      pointer-events: none;
    }

    @media (max-width: 900px) {
      body {
        padding: 0;
      }

      .story {
        border-radius: 0;
        width: 100vw;
        height: 100dvh;
      }

      .content {
        padding: 66px 44px 56px;
      }

      .shape.one {
        width: 190px;
        height: 190px;
        top: 80px;
        left: 30px;
      }

      .shape.two {
        width: 150px;
        height: 150px;
        right: 24px;
      }

      .shape.three {
        width: 110px;
        height: 110px;
        right: 46px;
      }

      .top-label {
        font-size: 18px;
        padding: 8px 16px;
      }

      .eid-message {
        line-height: 1.65;
      }

      .brand-ar {
        font-size: 32px;
      }

      .brand-en {
        font-size: 13px;
      }

      .dua {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="story" aria-label="تصميم تهنئة عيد الفطر من علي فلاتة">
    <div class="shape one"></div>
    <div class="shape two"></div>
    <div class="shape three"></div>

    <section class="content">
      <div class="top-label">تهنئة خاصة</div>

      <div class="main">
        <h1 class="eid-title">عيد فطر مبارك</h1>
        <div class="divider"></div>
        <h2 class="eid-sub">كل عام وأنتم بخير</h2>
        <p class="eid-message">
          بمناسبة عيد الفطر المبارك، أتمنى لكم أيامًا مليئة<br />
          بالفرح والسكينة والنجاح المتواصل.<br />
          <span class="gold">تقبّل الله طاعاتكم وأعاد العيد عليكم بالخير واليمن والبركات.</span>
        </p>
      </div>

      <div class="bottom">
        <div class="brand">
          <div class="brand-ar">علي فلاتة</div>
          <div class="brand-en">ALI FALLATAH</div>
        </div>
        <div class="dua">من القلب إلى قلوبكم، عيد سعيد عليكم وعلى أحبابكم.</div>
      </div>
    </section>

    <div class="footer-glow"></div>
  </main>
</body>
</html>
