<!--
Ziyada System 3D Logo Concept (SVG)
Modern, geometric, and visually striking. Uses official brand colors.
-->
<svg width="420" height="120" viewBox="0 0 420 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- 3D Geometric Motif -->
  <g filter="url(#shadow)">
    <polygon points="60,30 90,60 60,90 30,60" fill="url(#grad1)"/>
    <polygon points="60,30 90,60 120,30 90,0" fill="#0f172a" opacity="0.8"/>
    <polygon points="60,90 90,60 120,90 90,120" fill="#8b5cf6" opacity="0.7"/>
    <polygon points="30,60 60,90 30,120 0,90" fill="#3b82f6" opacity="0.7"/>
  </g>
  <!-- Ziyada System Text -->
  <text x="140" y="75" font-family="'Segoe UI', 'Arial', sans-serif" font-size="54" font-weight="bold" fill="url(#grad1)" filter="url(#shadow)">
    ziyada
  </text>
  <text x="142" y="110" font-family="'Segoe UI', 'Arial', sans-serif" font-size="28" font-weight="600" fill="#0f172a" opacity="0.85">
    system
  </text>
</svg>
