<!--
Ziyada System Logo Concept: Z + S, Workflow Nodes, Marketing Motion
Modern, 3D, and visually striking. Brand colors. Suitable for automation, AI, and marketing.
-->
<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradZ" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="60%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- Z Shape with S Path inside -->
  <g filter="url(#shadow)">
    <!-- Z shape -->
    <polyline points="60,60 260,60 60,260 260,260" fill="none" stroke="url(#gradZ)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- S path (workflow) -->
    <path d="M 80 90 Q 160 40 240 90 Q 160 160 80 230 Q 160 280 240 230" fill="none" stroke="#8b5cf6" stroke-width="16" stroke-linecap="round"/>
    <!-- Workflow nodes -->
    <circle cx="80" cy="90" r="14" fill="#3b82f6" stroke="#fff" stroke-width="4"/>
    <circle cx="240" cy="90" r="14" fill="#06b6d4" stroke="#fff" stroke-width="4"/>
    <circle cx="80" cy="230" r="14" fill="#8b5cf6" stroke="#fff" stroke-width="4"/>
    <circle cx="240" cy="230" r="14" fill="#3b82f6" stroke="#fff" stroke-width="4"/>
    <circle cx="160" cy="160" r="16" fill="#fff" stroke="#8b5cf6" stroke-width="6"/>
    <!-- Marketing motion: dynamic spark -->
    <ellipse cx="160" cy="40" rx="10" ry="4" fill="#ec4899" opacity="0.7"/>
    <ellipse cx="160" cy="280" rx="10" ry="4" fill="#ec4899" opacity="0.7"/>
    <ellipse cx="60" cy="60" rx="6" ry="2.5" fill="#06b6d4" opacity="0.5"/>
    <ellipse cx="260" cy="60" rx="6" ry="2.5" fill="#06b6d4" opacity="0.5"/>
    <ellipse cx="60" cy="260" rx="6" ry="2.5" fill="#3b82f6" opacity="0.5"/>
    <ellipse cx="260" cy="260" rx="6" ry="2.5" fill="#3b82f6" opacity="0.5"/>
  </g>
  <!-- Optional: Add brand name below -->
  <text x="50%" y="315" text-anchor="middle" font-family="'Segoe UI', 'Arial', sans-serif" font-size="32" font-weight="bold" fill="#0f172a" opacity="0.92">ziyada system</text>
</svg>
