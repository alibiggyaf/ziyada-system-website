<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)" />

  <!-- Subtle top accent glow -->
  <ellipse cx="600" cy="0" rx="500" ry="180" fill="#3b82f6" opacity="0.06" />

  <!-- Top accent line -->
  <rect x="200" y="160" width="800" height="3" rx="1.5" fill="url(#accent-line)" />

  <!-- ZIYADA - main title -->
  <text x="600" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="bold" fill="#ffffff" letter-spacing="16">ZIYADA</text>

  <!-- Arabic name -->
  <text x="600" y="360" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="bold" fill="#3b82f6" letter-spacing="4">&#x632;&#x64A;&#x627;&#x62F;&#x629;</text>

  <!-- Tagline -->
  <text x="600" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#94a3b8" letter-spacing="6">Digital Growth. Automated.</text>

  <!-- Bottom accent line -->
  <rect x="200" y="460" width="800" height="3" rx="1.5" fill="url(#accent-line)" />

  <!-- Subtle bottom accent glow -->
  <ellipse cx="600" cy="630" rx="500" ry="180" fill="#3b82f6" opacity="0.06" />
</svg>
